name: CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet: ['8.0.x']
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bank
          POSTGRES_PASSWORD: bank
          POSTGRES_DB: banking_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U bank"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
      - name: Restore
        run: dotnet restore Moongazing.OrionShowcase.sln
      - name: Build
        run: dotnet build Moongazing.OrionShowcase.sln -c Release --no-restore
      - name: Unit tests (exclude IntegrationTests which need Testcontainers)
        run: dotnet test Moongazing.OrionShowcase.sln -c Release --no-build --logger "console;verbosity=normal" --filter "FullyQualifiedName!~IntegrationTests"

      - name: Integration tests (skipped in CI; Testcontainers conflicts with GH services container)
        run: echo "IntegrationTests are run locally with 'docker compose up' + 'dotnet test'. The Testcontainers + GitHub Actions services-postgres combination causes a Docker-socket race; we will revisit in a future CI overhaul. See README's Five-minute experience for the local run."
        if: false  # disabled until the CI harness is rewritten

  publish-docker:
    needs: build-and-test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/tunahanaliozturk/orionshowcase-api:${{ github.event.release.tag_name }}
            ghcr.io/tunahanaliozturk/orionshowcase-api:latest
