name: CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        dotnet: ['8.0.x']
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bank
          POSTGRES_PASSWORD: bank
          POSTGRES_DB: banking_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U bank"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
      - name: Restore
        run: dotnet restore Moongazing.OrionShowcase.sln
      - name: Build
        run: dotnet build Moongazing.OrionShowcase.sln -c Release --no-restore
      - name: Unit tests (exclude IntegrationTests which need Testcontainers)
        run: dotnet test Moongazing.OrionShowcase.sln -c Release --no-build --logger "console;verbosity=normal" --filter "FullyQualifiedName!~IntegrationTests"

      # Integration tests are wired to run against the services Postgres above: BankingApiFixture
      # provisions a unique database per test class when BANKING_TEST_POSTGRES is set (no Docker-in-
      # Docker / Testcontainers race), the assembly runs sequentially, and the timer-based hosted
      # services are disabled in the test host. They are NOT yet enabled in CI because the very first
      # end-to-end test (RegisterAndOpenAccountTests) currently hangs against a real Postgres; these
      # tests had never actually executed anywhere before (no Docker locally, disabled here), so the
      # hang is a genuine latent issue to diagnose. Tracked in docs/ROADMAP.md. To enable once fixed,
      # flip `if: false` to a real run with the env + filter below:
      #   env: { BANKING_TEST_POSTGRES: "Host=localhost;Port=5432;Username=bank;Password=bank;Database=banking_ci" }
      #   run: dotnet test ... --filter "FullyQualifiedName~IntegrationTests" --blame-hang-timeout 120s
      - name: Integration tests (DIAGNOSTIC - collect hang dump)
        id: integration
        continue-on-error: true
        timeout-minutes: 8
        env:
          BANKING_TEST_POSTGRES: "Host=localhost;Port=5432;Username=bank;Password=bank;Database=banking_ci"
        run: dotnet test Moongazing.OrionShowcase.sln -c Release --no-build --logger "console;verbosity=normal" --filter "FullyQualifiedName~IntegrationTests" --blame-hang-timeout 90s --blame-hang-dump-type full

      - name: Analyze hang dump (managed stacks of the stalled test host)
        if: always()
        run: |
          dotnet tool install -g dotnet-dump >/dev/null 2>&1 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          DUMP=$(find . -name "*.dmp" 2>/dev/null | head -1)
          echo "dump file: ${DUMP:-<none>}"
          if [ -n "$DUMP" ]; then
            echo "===== PENDING ASYNC ====="
            dotnet-dump analyze "$DUMP" -c "dumpasync -completed" -c "exit" 2>&1 | head -150
            echo "===== ALL THREAD STACKS ====="
            dotnet-dump analyze "$DUMP" -c "clrstack -all" -c "exit" 2>&1 | head -400
          else
            echo "No hang dump produced - the integration suite did not stall."
          fi

  publish-docker:
    needs: build-and-test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/tunahanaliozturk/orionshowcase-api:${{ github.event.release.tag_name }}
            ghcr.io/tunahanaliozturk/orionshowcase-api:latest
