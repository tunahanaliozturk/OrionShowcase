name: CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet: ['8.0.x']
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bank
          POSTGRES_PASSWORD: bank
          POSTGRES_DB: banking_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U bank"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
      - name: Restore
        run: dotnet restore Moongazing.OrionShowcase.sln
      - name: Build
        run: dotnet build Moongazing.OrionShowcase.sln -c Release --no-restore
      - name: Unit tests (exclude IntegrationTests which need Testcontainers)
        run: dotnet test Moongazing.OrionShowcase.sln -c Release --no-build --logger "console;verbosity=normal" --filter "FullyQualifiedName!~IntegrationTests"

      - name: Integration tests (end-to-end against the services Postgres)
        # The fixture provisions a unique database per test class on this server (instead of starting
        # a Testcontainers container), so the Testcontainers/services-postgres Docker-socket race is
        # avoided while the full register/open/transfer, PII-at-rest, national-id uniqueness, SSE
        # resume, and outbox/webhook dead-letter flows run end-to-end against a real Postgres.
        timeout-minutes: 12
        env:
          BANKING_TEST_POSTGRES: "Host=localhost;Port=5432;Username=bank;Password=bank;Database=banking_ci"
        run: dotnet test Moongazing.OrionShowcase.sln -c Release --no-build --logger "console;verbosity=detailed" --filter "FullyQualifiedName~IntegrationTests" --blame-hang-timeout 120s --blame-hang-dump-type none

  publish-docker:
    needs: build-and-test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/tunahanaliozturk/orionshowcase-api:${{ github.event.release.tag_name }}
            ghcr.io/tunahanaliozturk/orionshowcase-api:latest
